<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falki Dashboard</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

<!-- Header -->
<div class="header">
  <h1><span>Falki</span> Dashboard</h1>
  <div class="ws-indicator">
    <div class="ws-dot" id="ws-dot"></div>
    <span id="ws-status">Verbinde...</span>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" data-tab="tab-dashboard">Dashboard</button>
  <button class="tab-btn" data-tab="tab-tasks">Tasks</button>
  <button class="tab-btn" data-tab="tab-schedules">Schedules</button>
  <button class="tab-btn" data-tab="tab-config">Config</button>
</div>

<!-- ── Dashboard Tab ─────────────────────────────────────────────── -->
<div class="tab-content active" id="tab-dashboard">
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Aktive Agents</div>
      <div class="value" id="stat-agents">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Offene Tasks</div>
      <div class="value" id="stat-tasks">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Token Budget</div>
      <div class="value" id="stat-budget">--</div>
    </div>
    <div class="stat-card">
      <div class="label">Ollama</div>
      <div class="value" id="stat-ollama">--</div>
    </div>
  </div>

  <div class="card">
    <h2>Aktive Agents</h2>
    <div class="agents-list" id="agents-list">
      <span class="no-agents">Keine aktiven Agents</span>
    </div>
  </div>

  <div class="card">
    <h2>Letzte Tasks</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Titel</th><th>Status</th><th>Agent</th></tr>
      </thead>
      <tbody id="recent-tasks"></tbody>
    </table>
  </div>
</div>

<!-- ── Tasks Tab ─────────────────────────────────────────────────── -->
<div class="tab-content" id="tab-tasks">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openModal('modal-task')">+ Neuer Task</button>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr><th>ID</th><th>Titel</th><th>Status</th><th>Agent</th><th>Erstellt</th><th></th></tr>
      </thead>
      <tbody id="tasks-table"></tbody>
    </table>
  </div>
</div>

<!-- ── Schedules Tab ─────────────────────────────────────────────── -->
<div class="tab-content" id="tab-schedules">
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openScheduleModal()">+ Neu</button>
    <button class="btn" onclick="openModal('modal-ai-schedule')">AI Erstellen</button>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr><th>Name</th><th>Schedule</th><th>Agent</th><th>Status</th><th>Letzter Lauf</th><th>Aktionen</th></tr>
      </thead>
      <tbody id="schedules-table"></tbody>
    </table>
  </div>
</div>

<!-- ── Config Tab ────────────────────────────────────────────────── -->
<div class="tab-content" id="tab-config">
  <div id="config-container"></div>
</div>

<!-- ── Modal: Neuer Task ─────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-task" onclick="closeModalOverlay(event)">
  <div class="modal">
    <h2>Neuer Task</h2>
    <div class="form-group">
      <label>Aufgabe beschreiben</label>
      <textarea id="task-text" rows="4" placeholder="Was soll erledigt werden?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-task')">Abbrechen</button>
      <button class="btn btn-primary" onclick="submitTask()">Absenden</button>
    </div>
  </div>
</div>

<!-- ── Modal: Schedule ───────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-schedule" onclick="closeModalOverlay(event)">
  <div class="modal">
    <h2 id="schedule-modal-title">Neuer Schedule</h2>
    <input type="hidden" id="schedule-edit-id" value="">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="sched-name" placeholder="z.B. Täglicher Report">
    </div>
    <div class="form-group">
      <label>Schedule (Cron oder natürlich)</label>
      <input type="text" id="sched-schedule" placeholder="z.B. täglich 09:00">
    </div>
    <div class="form-group">
      <label>Agent-Typ</label>
      <select id="sched-agent-type">
        <option value="researcher">researcher</option>
        <option value="writer">writer</option>
        <option value="coder">coder</option>
        <option value="ops">ops</option>
      </select>
    </div>
    <div class="form-group">
      <label>Aktive Stunden (optional)</label>
      <input type="text" id="sched-active-hours" placeholder="z.B. 08:00-18:00">
    </div>
    <div class="form-group">
      <label>Prompt</label>
      <textarea id="sched-prompt" rows="4" placeholder="Was soll der Agent tun?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-schedule')">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveSchedule()">Speichern</button>
    </div>
  </div>
</div>

<!-- ── Modal: AI Schedule ────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-ai-schedule" onclick="closeModalOverlay(event)">
  <div class="modal">
    <h2>Schedule per AI erstellen</h2>
    <div class="form-group">
      <label>Beschreibe den gewünschten Schedule</label>
      <textarea id="ai-sched-desc" rows="4" placeholder="z.B. Jeden Morgen die neuesten KI-News zusammenfassen"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-ai-schedule')">Abbrechen</button>
      <button class="btn btn-primary" onclick="aiCreateSchedule()">AI Erstellen</button>
    </div>
  </div>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
