<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falkenstein — Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { font-size: 20px; font-weight: 600; }
        header h1 span { color: #fbbf24; }
        header a { color: #94a3b8; text-decoration: none; font-size: 14px; }
        header a:hover { color: #e2e8f0; }
        main { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .status-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
        }
        .status-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-card .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
        .status-card .value.online { color: #4ade80; }
        .status-card .value.offline { color: #f87171; }
        .budget-bar { height: 8px; background: #334155; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .budget-fill { height: 100%; background: #fbbf24; border-radius: 4px; transition: width 0.3s; }
        .recent-tasks { margin-bottom: 32px; }
        .recent-tasks h2 { font-size: 16px; margin-bottom: 12px; color: #94a3b8; }
        .task-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; background: #1e293b; border: 1px solid #334155;
            border-radius: 6px; margin-bottom: 6px; font-size: 14px;
        }
        .task-id { color: #64748b; font-size: 12px; min-width: 40px; }
        .task-title { flex: 1; }
        .task-status {
            font-size: 11px; padding: 2px 8px; border-radius: 4px;
            text-transform: uppercase; font-weight: 600;
        }
        .task-status-open { background: #334155; color: #94a3b8; }
        .task-status-in_progress { background: #854d0e; color: #fbbf24; }
        .task-status-done { background: #166534; color: #4ade80; }
        .task-status-failed { background: #7f1d1d; color: #f87171; }
        .task-agent { color: #64748b; font-size: 12px; min-width: 80px; text-align: right; }
        .settings-section h2 { font-size: 16px; margin-bottom: 16px; color: #94a3b8; }
        .settings-group {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .settings-group h3 {
            font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em;
            color: #fbbf24; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .settings-group h3 .badge {
            font-size: 10px; padding: 2px 8px; border-radius: 4px;
            background: #7f1d1d; color: #fca5a5; font-weight: 400;
            text-transform: none; letter-spacing: 0;
        }
        .field-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 12px;
        }
        .field-row label {
            min-width: 220px; font-size: 13px; color: #94a3b8;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .field-row input, .field-row select {
            flex: 1; background: #0f172a; border: 1px solid #334155;
            color: #e2e8f0; padding: 8px 12px; border-radius: 6px;
            font-size: 14px; font-family: inherit;
        }
        .field-row input:focus, .field-row select:focus {
            outline: none; border-color: #fbbf24;
        }
        .pw-toggle {
            background: none; border: 1px solid #334155; color: #94a3b8;
            padding: 8px; border-radius: 6px; cursor: pointer; font-size: 14px;
        }
        .pw-toggle:hover { color: #e2e8f0; border-color: #64748b; }
        .save-btn {
            background: #fbbf24; color: #0f172a; border: none;
            padding: 8px 20px; border-radius: 6px; font-weight: 600;
            font-size: 14px; cursor: pointer;
        }
        .save-btn:hover { background: #f59e0b; }
        .save-msg { font-size: 12px; margin-left: 12px; }
        .save-msg.ok { color: #4ade80; }
        .save-msg.warn { color: #fbbf24; }
        .group-footer { display: flex; align-items: center; margin-top: 16px; }
        .active-agents { margin-bottom: 12px; }
        .agent-chip {
            display: inline-flex; align-items: center; gap: 6px;
            background: #334155; padding: 4px 10px; border-radius: 4px;
            font-size: 12px; margin-right: 6px; margin-bottom: 4px;
        }
        .agent-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
    </style>
</head>
<body>
    <header>
        <h1><span>Falkenstein</span> Admin</h1>
        <a href="/">← Zurück zum Büro</a>
    </header>
    <main>
        <div class="status-grid" id="status-grid"></div>
        <div class="active-agents" id="active-agents"></div>
        <div class="recent-tasks">
            <h2>Letzte Tasks</h2>
            <div id="recent-tasks"></div>
        </div>
        <div class="settings-section">
            <h2>Einstellungen</h2>
            <div id="settings-container"></div>
        </div>
    </main>
    <script>
    const GROUP_LABELS = {
        llm: 'LLM / Ollama',
        telegram: 'Telegram',
        cli: 'CLI Bridge',
        obsidian: 'Obsidian',
        server: 'Server (Neustart nötig)',
    };

    async function loadDashboard() {
        try {
            const resp = await fetch('/api/admin/dashboard');
            const d = await resp.json();
            const pct = d.budget.budget ? Math.round(d.budget.used / d.budget.budget * 100) : 0;
            const uptimeMin = Math.floor(d.uptime_seconds / 60);
            const uptimeH = Math.floor(uptimeMin / 60);
            const uptimeStr = uptimeH > 0 ? uptimeH + 'h ' + (uptimeMin % 60) + 'm' : uptimeMin + 'm';

            document.getElementById('status-grid').innerHTML =
                '<div class="status-card"><div class="label">Ollama</div><div class="value ' + d.ollama_status + '">' + (d.ollama_status === 'online' ? '● Online' : '○ Offline') + '</div></div>' +
                '<div class="status-card"><div class="label">Aktive Agents</div><div class="value">' + d.active_agents.length + '</div></div>' +
                '<div class="status-card"><div class="label">Offene Tasks</div><div class="value">' + d.open_tasks_count + '</div></div>' +
                '<div class="status-card"><div class="label">Uptime</div><div class="value">' + uptimeStr + '</div></div>' +
                '<div class="status-card"><div class="label">CLI Budget</div><div class="value">' + pct + '%</div><div class="budget-bar"><div class="budget-fill" style="width:' + pct + '%"></div></div></div>';

            const agentsEl = document.getElementById('active-agents');
            agentsEl.innerHTML = d.active_agents.length > 0
                ? d.active_agents.map(a => '<span class="agent-chip"><span class="dot"></span>' + a.type + ': ' + a.task + '</span>').join('')
                : '';

            const tasksEl = document.getElementById('recent-tasks');
            tasksEl.innerHTML = d.recent_tasks.length === 0
                ? '<div style="color:#64748b;font-size:14px">Keine Tasks.</div>'
                : d.recent_tasks.map(t =>
                    '<div class="task-row"><span class="task-id">#' + t.id + '</span><span class="task-title">' + t.title + '</span><span class="task-status task-status-' + t.status + '">' + t.status + '</span><span class="task-agent">' + (t.agent || '—') + '</span></div>'
                ).join('');
        } catch (e) { console.error('Dashboard load error:', e); }
    }

    async function loadSettings() {
        try {
            const resp = await fetch('/api/admin/settings');
            const data = await resp.json();
            const container = document.getElementById('settings-container');
            container.innerHTML = '';

            for (const [groupName, fields] of Object.entries(data.groups)) {
                const isServer = groupName === 'server';
                const label = GROUP_LABELS[groupName] || groupName;
                const badge = isServer ? '<span class="badge">Neustart nötig</span>' : '';

                let fieldsHtml = '';
                for (const [fieldName, meta] of Object.entries(fields)) {
                    let inputHtml;
                    if (meta.type === 'password') {
                        inputHtml = '<input type="password" id="f-' + fieldName + '" value="' + (meta.value === '***' ? '' : meta.value) + '" placeholder="' + (meta.value === '***' ? '(gesetzt)' : '(leer)') + '"><button class="pw-toggle" onclick="togglePw(\'f-' + fieldName + '\')">👁</button>';
                    } else if (meta.type === 'boolean') {
                        const checked = (meta.value === 'True' || meta.value === 'true') ? 'checked' : '';
                        inputHtml = '<input type="checkbox" id="f-' + fieldName + '" ' + checked + ' style="width:auto">';
                    } else if (meta.type === 'select' && meta.options) {
                        const opts = meta.options.map(o => '<option value="' + o + '"' + (o === meta.value ? ' selected' : '') + '>' + o + '</option>').join('');
                        inputHtml = '<select id="f-' + fieldName + '">' + opts + '</select>';
                    } else {
                        const inputType = meta.type === 'number' ? 'number' : 'text';
                        inputHtml = '<input type="' + inputType + '" id="f-' + fieldName + '" value="' + meta.value + '">';
                    }
                    fieldsHtml += '<div class="field-row"><label for="f-' + fieldName + '">' + fieldName + '</label>' + inputHtml + '</div>';
                }

                container.innerHTML += '<div class="settings-group" data-group="' + groupName + '"><h3>' + label + ' ' + badge + '</h3>' + fieldsHtml + '<div class="group-footer"><button class="save-btn" onclick="saveGroup(\'' + groupName + '\')">Speichern</button><span class="save-msg" id="msg-' + groupName + '"></span></div></div>';
            }
        } catch (e) { console.error('Settings load error:', e); }
    }

    async function saveGroup(groupName) {
        const group = document.querySelector('.settings-group[data-group="' + groupName + '"]');
        const inputs = group.querySelectorAll('input, select');
        const values = {};
        inputs.forEach(el => {
            const name = el.id.replace('f-', '');
            if (el.type === 'checkbox') {
                values[name] = el.checked ? 'true' : 'false';
            } else if (el.type === 'password' && el.value === '') {
                return;
            } else {
                values[name] = el.value;
            }
        });

        try {
            const resp = await fetch('/api/admin/settings', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({group: groupName, values}),
            });
            const data = await resp.json();
            const msgEl = document.getElementById('msg-' + groupName);
            if (data.saved) {
                if (data.restart_required) {
                    msgEl.className = 'save-msg warn';
                    msgEl.textContent = '⚠ Gespeichert — Neustart nötig';
                } else {
                    msgEl.className = 'save-msg ok';
                    msgEl.textContent = '✓ Gespeichert & aktiv';
                }
            } else {
                msgEl.className = 'save-msg warn';
                msgEl.textContent = '✗ Fehler: ' + (data.error || 'unbekannt');
            }
            setTimeout(() => { msgEl.textContent = ''; }, 5000);
        } catch (e) { console.error('Save error:', e); }
    }

    function togglePw(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    loadDashboard();
    loadSettings();
    setInterval(loadDashboard, 10000);
    </script>
</body>
</html>
