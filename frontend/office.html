<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falkenstein — Büro</title>
  <link rel="stylesheet" href="/static/office.css">
</head>
<body>
  <div id="game-container"></div>

  <!-- HUD -->
  <div class="hud-bar">
    <span class="hud-title">Falkenstein Büro</span>
    <span class="hud-label">Agents</span><span class="hud-value" id="hud-agents">0</span>
    <span class="hud-label">Arbeitet</span><span class="hud-value hud-value-working" id="hud-working">0</span>
    <span class="hud-label">Pause</span><span class="hud-value hud-value-break" id="hud-break">0</span>
    <span class="hud-label">Tasks</span><span class="hud-value" id="hud-tasks">0</span>
    <span class="hud-label">Schedules</span><span class="hud-value" id="hud-schedules">0</span>
    <span class="hud-spacer"></span>
    <span class="hud-label">Zoom</span><span class="hud-value" id="hud-zoom">1.0x</span>
    <span class="hud-dot" id="hud-ws" title="WebSocket"></span>
  </div>

  <div class="office-guide">
    <div class="guide-title">Büro-Guide</div>
    <div class="guide-row"><span class="guide-kbd">WASD</span><span>Bewegen</span></div>
    <div class="guide-row"><span class="guide-kbd">E</span><span>Objekt oder Monitor öffnen</span></div>
    <div class="guide-row"><span class="guide-kbd">Klick</span><span>Minimap springt zur Position</span></div>
    <div class="guide-row"><span class="guide-kbd">ESC</span><span>Panel schließen</span></div>
    <div class="guide-legend">
      <span class="status-pill working">arbeitet</span>
      <span class="status-pill progress">live</span>
      <span class="status-pill break">pause</span>
      <span class="status-pill error">fehler</span>
    </div>
  </div>

  <!-- Minimap -->
  <div class="minimap" id="minimap">
    <canvas id="minimap-canvas" width="180" height="144"></canvas>
  </div>

  <!-- Panel overlay -->
  <div class="panel-overlay hidden" id="panel-overlay" onclick="if(event.target===this)window.panelManager?.close()">
    <div class="panel-box" id="panel-content" style="position:relative;"></div>
  </div>

  <!-- Interaction hint -->
  <div class="interact-hint hidden" id="interact-hint">[E] Interagieren</div>

  <!-- Music Player -->
  <div id="music-player" class="music-player">
    <div class="music-header">
      <div class="music-info">
        <span class="music-icon">🎵</span>
        <div class="music-copy">
          <span id="music-title">Lofi Beats</span>
          <span id="music-subtitle" class="music-subtitle">Lokale Loop</span>
        </div>
      </div>
      <span id="music-badge" class="music-badge">lokal</span>
    </div>
    <div class="music-main-row">
      <div class="music-controls">
        <button onclick="musicPlayer.prev()">⏮</button>
        <button id="music-toggle" onclick="musicPlayer.toggle()">▶</button>
        <button onclick="musicPlayer.next()">⏭</button>
      </div>
      <input type="range" id="music-volume" class="music-volume" min="0" max="100" value="30" oninput="musicPlayer.setVolume(this.value/100)">
      <select id="music-genre" onchange="musicPlayer.setGenre(this.value)">
        <option value="lofi">Lofi</option>
        <option value="jazz">Jazz</option>
        <option value="ambient">Ambient</option>
        <option value="classical">Classical</option>
        <option value="custom">Eigene Audio-URL</option>
        <optgroup label="Apple Music">
          <option value="apple_lofi">Apple Lofi</option>
          <option value="apple_jazz">Apple Jazz</option>
          <option value="apple_ambient">Apple Ambient</option>
          <option value="apple_classical">Apple Classical</option>
        </optgroup>
      </select>
    </div>
    <div id="music-custom-row" class="music-custom-row hidden">
      <textarea
        id="music-custom-url"
        class="music-custom-url"
        placeholder="https://.../track1.mp3&#10;https://.../track2.mp3"
        autocomplete="off"
      ></textarea>
      <div class="music-custom-actions">
        <button class="music-secondary-btn" onclick="musicPlayer.saveCustomPlaylist()">Playlist speichern</button>
        <button class="music-secondary-btn" onclick="musicPlayer.clearCustomUrl()">Leeren</button>
      </div>
    </div>
  </div>

  <!-- Activity Feed -->
  <div id="activity-feed" class="office-activity-feed">
    <div class="feed-header">Aktivitäten</div>
    <div id="feed-entries"></div>
  </div>
  <a href="/" class="office-back-btn">← Zurück</a>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="/static/office/music.js"></script>
  <script src="/static/office/daylight.js"></script>
  <script type="module" src="/static/office/main.js"></script>
</body>
</html>
